<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="HandheldFriendly" content="true" />

  <title>Clickteam Fusion Developer 2.5 HTML5 Runtime</title>

  <style>
    body { background-color: #000; text-align: center; margin: 0; padding: 0; overflow: hidden; }
    canvas { touch-action: none; -ms-touch-action: none; }
    #bloctxt { border-left: 5px solid #F00; padding-left: 10px; position: absolute; left: 50%; width: 600px; margin-left: -300px; color: #FFF; }
  </style>

  <script>
    if (!document.createElement("canvas").getContext) {
        window.open("http://www.clickteam.com/html5-fallback", "_self");
    }
  </script>

  <script src="src/Runtime.js"></script>

  <script>
    window.addEventListener("load", function() {
        var canvas = document.getElementById("MMFCanvas");
        
        function handleTouch(e) {
            e.preventDefault();
            var touch = e.changedTouches[0];
            var type = "";
            switch(e.type) {
                case "touchstart": type = "mousedown"; break;
                case "touchend": type = "mouseup"; break;
                case "touchmove": type = "mousemove"; break;
            }
            var mouseEvent = new MouseEvent(type, {
                bubbles: true,
                cancelable: true,
                view: window,
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }

        canvas.addEventListener("touchstart", handleTouch, {passive: false});
        canvas.addEventListener("touchend", handleTouch, {passive: false});
        canvas.addEventListener("touchmove", handleTouch, {passive: false});
    });
  </script>
</head>

<body>
    <canvas id="MMFCanvas" width="1024" height="768">
        Your browser does not support Canvas.
    </canvas>

<script>
    window.addEventListener("load", windowLoaded, false);
    function windowLoaded() {
        new Runtime("MMFCanvas", "resources/FNAF2HTML5.cch");
    }
</script>
</body>
</html>
